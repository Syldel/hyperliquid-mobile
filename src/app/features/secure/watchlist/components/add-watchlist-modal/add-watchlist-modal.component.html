<ion-header>
  <ion-toolbar>
    <ion-title>{{ headerTitle() }}</ion-title>
    <ion-buttons slot="start">
      <ion-button (click)="cancel()">Cancel</ion-button>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button strong [disabled]="form.invalid" (click)="confirm()">
        {{ submitButtonLabel() }}
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <form [formGroup]="form">
    <!-- Pair picker -->
    <ion-list inset>
      <ion-item [button]="!isEditMode()" class="pair-picker" (click)="openMarketPicker()">
        <ion-label position="stacked">Pair</ion-label>
        <ion-text>
          {{ selectedCoin() || 'Select a pair' }}
        </ion-text>
        @if (!isEditMode()) {
          <ion-icon name="chevron-forward-outline" slot="end" />
        }
      </ion-item>
    </ion-list>

    <!-- Interval -->
    <ion-list inset>
      <ion-item>
        <ion-label>Default interval</ion-label>
        <ion-select
          formControlName="interval"
          interface="action-sheet"
          placeholder="Select interval"
        >
          @for (iv of intervals; track iv) {
            <ion-select-option [value]="iv">{{ intervalLabels[iv] }}</ion-select-option>
          }
        </ion-select>
      </ion-item>
    </ion-list>
  </form>
</ion-content>
