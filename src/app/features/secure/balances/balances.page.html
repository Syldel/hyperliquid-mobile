<app-refreshable-layout
  title="Balances"
  [fetchFn]="fetchFn"
  emptyMessage="No balances found"
  (dataLoaded)="balances.set($event)"
>
  <ion-list>
    @for (balance of balances(); track balance.token) {
    <ion-item>
      <ion-label>
        <h2>{{ balance.coin }}</h2>
        <p>{{ balance.total }}</p>
      </ion-label>
      <ion-note slot="end" color="medium">Hold: {{ balance.hold }}</ion-note>
    </ion-item>
    }
  </ion-list>
</app-refreshable-layout>
