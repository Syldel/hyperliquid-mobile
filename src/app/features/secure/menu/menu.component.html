<ion-menu side="start" menuId="main-menu" contentId="main-content">
  <app-page-header
    startButton="none"
    color="primary"
    [hasStartButtons]="false"
    [hasEndButtons]="true"
    title="Hyperliquid"
  >
    <ion-button slot="end">
      <app-user-avatar-btn
        [isLoggedIn]="isLoggedIn()"
        (profileClick)="onMenuItemClick('/secure/profile')"
      ></app-user-avatar-btn>
    </ion-button>
  </app-page-header>
  <ion-content>
    <ion-list>
      <ion-item (click)="onMenuItemClick('/secure/dashboard')">
        <ion-icon aria-hidden="true" name="home-outline" slot="start"></ion-icon>
        <ion-label>Dashboard</ion-label>
      </ion-item>
      <ion-item (click)="onMenuItemClick('/secure/balances')">
        <ion-icon aria-hidden="true" name="pie-chart-outline" slot="start"></ion-icon>
        <ion-label>Spot Balances</ion-label>
      </ion-item>
      <ion-item (click)="onMenuItemClick('/secure/perp-summary')">
        <ion-icon aria-hidden="true" name="stats-chart-outline" slot="start"></ion-icon>
        <ion-label>Perp Summary</ion-label>
      </ion-item>
      <ion-item (click)="onMenuItemClick('/secure/open-orders')">
        <ion-icon aria-hidden="true" name="receipt-outline" slot="start"></ion-icon>
        <ion-label>Open Orders</ion-label>
      </ion-item>
      <ion-item (click)="onMenuItemClick('/secure/bot-strategies')">
        <ion-icon aria-hidden="true" name="hardware-chip-outline" slot="start"></ion-icon>
        <ion-label>Bot Strategies</ion-label>
        @if (!isLoggedIn()) {
          <ion-icon name="lock-closed-outline" slot="end" color="medium"></ion-icon>
        }
      </ion-item>
      <ion-item (click)="onMenuItemClick('/secure/settings')">
        <ion-icon aria-hidden="true" name="settings-outline" slot="start"></ion-icon>
        <ion-label>Settings</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
  <ion-footer>
    <ion-item (click)="logout()" lines="none">
      <ion-icon aria-hidden="true" name="log-out-outline" slot="start"></ion-icon>
      <ion-label>Logout</ion-label>
    </ion-item>
  </ion-footer>
</ion-menu>

<ion-router-outlet id="main-content"></ion-router-outlet>
