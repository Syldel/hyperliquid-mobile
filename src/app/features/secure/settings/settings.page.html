<app-page-header title="Settings" />
<ion-content>
  <ion-list-header>Appearance</ion-list-header>
  <ion-list [inset]="true">
    <ion-item>
      <ion-toggle
        [checked]="isDarkMode()"
        (ionChange)="toggleChange($event)"
        justify="space-between"
      >
        Dark Mode
      </ion-toggle>
    </ion-item>
  </ion-list>
</ion-content>
