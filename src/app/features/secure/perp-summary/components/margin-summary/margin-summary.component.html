<ion-list-header class="ion-margin-top">
  <ion-label class="ion-font-weight-bold">
    <h2>{{ title() }}</h2>
  </ion-label>
</ion-list-header>
<ion-item>
  <ion-label>
    <p>Account value</p>
    <h3>{{ summary().accountValue | smartDecimal }}</h3>
  </ion-label>
</ion-item>
<ion-item>
  <ion-label>
    <p>Margin used</p>
    <h3>{{ summary().totalMarginUsed | smartDecimal }}</h3>
  </ion-label>
</ion-item>
<ion-item>
  <ion-label>
    <p>Notional position</p>
    <h3>{{ summary().totalNtlPos | smartDecimal }}</h3>
  </ion-label>
</ion-item>
<ion-item>
  <ion-label>
    <p>Raw USD</p>
    <h3>{{ summary().totalRawUsd | smartDecimal }}</h3>
  </ion-label>
</ion-item>
